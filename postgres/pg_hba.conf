# TYPE  DATABASE            USER          ADDRESS         METHOD
# Superuser — local socket only
local   all                 postgres                      peer
# App user — local socket (for docker exec / scripts inside container)
local   ethos_wallet_intel  ethos_intel                   trust
# App user — loopback only (inside container)
host    ethos_wallet_intel  ethos_intel   127.0.0.1/32    scram-sha-256
host    ethos_wallet_intel  ethos_intel   ::1/128         scram-sha-256
# App user — docker internal network (host gateway 172.21.0.1)
host    ethos_wallet_intel  ethos_intel   172.21.0.0/16   scram-sha-256
# Reject everything else
host    all                 all           0.0.0.0/0       reject
host    all                 all           ::/0            reject
