# TYPE  DATABASE            USER          ADDRESS         METHOD
# Superuser — local socket only
local   all                 postgres                      peer
# App user — loopback only, scram-sha-256
host    ethos_wallet_intel  ethos_intel   127.0.0.1/32    scram-sha-256
host    ethos_wallet_intel  ethos_intel   ::1/128         scram-sha-256
