# ── Connection ──────────────────────────────────────────────────────────────
listen_addresses = '*'       # ONLY loopback — no network exposure
port = 5432
max_connections = 25                 # Service needs ~5, headroom for migrations/admin

# ── Memory — tuned for Pi 5 8GB, leaves ~7GB for OS + service ──────────────
shared_buffers = 512MB               # Rule of thumb: 25% RAM, capped lower for Pi
work_mem = 16MB                      # Per sort/hash op — 25 conns × 16MB = 400MB max
maintenance_work_mem = 128MB         # For VACUUM, CREATE INDEX
effective_cache_size = 2GB           # Planner hint: how much OS can cache

# ── Write performance — microSD optimised ───────────────────────────────────
synchronous_commit = off             # ~200ms durability risk, big write speedup on SD
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 256MB
min_wal_size = 64MB

# ── Planner — microSD has poor random I/O ───────────────────────────────────
random_page_cost = 3.0               # 4.0 is default for HDD; lower = prefer index scans
effective_io_concurrency = 1         # SD can't do parallel I/O

# ── Logging — minimal, errors only ──────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_timezone = 'Europe/London'

# ── Locale / timezone ───────────────────────────────────────────────────────
timezone = 'Europe/London'
datestyle = 'iso, mdy'
